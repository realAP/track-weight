services:
  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://weighttracker:${DB_PASSWORD}@db:5432/weighttracker
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weighttracker
      POSTGRES_USER: weighttracker
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weighttracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
