services:
  bot:
    build: .
    environment:
      BOT_TOKEN: '${BOT_TOKEN}'
      DATABASE_URL: 'postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}'
    volumes:
      - botlogs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: '${DB_NAME}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -d ${DB_NAME} -U ${DB_USER} || exit 1'
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backup:
    image: devp1337/backup:2.0.0
    environment:
      PROVISION_MODE: postgres
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DATABASE: '${DB_NAME}'
      POSTGRES_HOST: db
      RESTIC_REPOSITORY_NAME: '${BACKUP_RESTIC_REPO}'
      RESTIC_PASSWORD: '${BACKUP_RESTIC_PASSWORD}'
      TELEGRAM_TOKEN: '${BOT_TOKEN}'
      TELEGRAM_CHAT_ID: '${BACKUP_TELEGRAM_CHAT_ID}'
      TELEGRAM_COMMENT: '${BACKUP_TELEGRAM_COMMENT}'
      CRON: '${BACKUP_CRON}'
      TARGET_DOMAIN: '${BACKUP_SFTP_HOST}'
      TARGET_DOMAIN_USER: '${BACKUP_SFTP_USER}'
      SSH_PRIVATE_KEY_BASE64: '${BACKUP_SSH_KEY_BASE64}'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -h db > /dev/null || exit 1'
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  pgdata:
  botlogs:
